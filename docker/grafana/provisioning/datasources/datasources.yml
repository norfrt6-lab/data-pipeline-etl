apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: crypto_warehouse
    user: pipeline
    secureJsonData:
      password: pipeline_secret
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      postgresVersion: 1600
    editable: false
