crypto_warehouse:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'pipeline') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'pipeline_secret') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'crypto_warehouse') }}"
      schema: public
      threads: 4
